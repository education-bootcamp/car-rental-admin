<div class="login-page">
  <main class="login-main">
    <div class="login-card">

      <!-- Brand mark -->
      <div class="card-brand">
        <span class="brand-dot"></span>
        <span class="brand-label">Car Rental</span>
      </div>

      <h1 class="card-title">Welcome back</h1>
      <p class="card-subtitle">Sign in to manage your bookings and fleet.</p>

      <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="login-form" novalidate>

        <!-- Email -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email address</mat-label>
          <mat-icon matPrefix class="field-prefix-icon">mail_outline</mat-icon>
          <input
            matInput
            type="email"
            formControlName="email"
            placeholder="you@example.com"
            autocomplete="email"
          />
          <mat-error *ngIf="loginForm.get('email')?.touched">
            {{ getEmailError() }}
          </mat-error>
        </mat-form-field>

        <!-- Password -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <mat-icon matPrefix class="field-prefix-icon">lock_outline</mat-icon>
          <input
            matInput
            [type]="hidePassword ? 'password' : 'text'"
            formControlName="password"
            placeholder="Min. 8 characters"
            autocomplete="current-password"
          />
          <button
            mat-icon-button
            matSuffix
            type="button"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'"
            class="visibility-toggle"
          >
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.touched">
            {{ getPasswordError() }}
          </mat-error>
        </mat-form-field>

        <!-- Forgot password -->
        <div class="forgot-row">
          <a routerLink="/forgot-password" class="forgot-link">Forgot password?</a>
        </div>

        <!-- Login button -->
        <button
          mat-flat-button
          type="submit"
          class="btn-login"
          [disabled]="isLoading"
        >
          <mat-spinner *ngIf="isLoading" diameter="18" class="btn-spinner"></mat-spinner>
          <span *ngIf="!isLoading">Sign in</span>
        </button>

      </form>

      <!-- Divider -->
      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-text">Don't have an account?</span>
        <span class="divider-line"></span>
      </div>

      <!-- Register button -->
      <a routerLink="/register" mat-stroked-button class="btn-register">
        <mat-icon>person_add_alt_1</mat-icon>
        Create an account
      </a>

    </div>
  </main>
</div>
