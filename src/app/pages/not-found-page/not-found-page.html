<app-home-header/>
<div class="nf">

  <!-- Road SVG illustration -->
  <div class="nf__illustration" aria-hidden="true">
    <svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" fill="none">
      <!-- Sky -->
      <rect width="320" height="180" fill="var(--clouds)" rx="16"/>

      <!-- Road -->
      <rect x="0" y="120" width="320" height="60" fill="var(--wet-asphalt)"/>

      <!-- Road dashes -->
      <rect x="20"  y="147" width="40" height="6" rx="3" fill="var(--asbestos)" opacity="0.5"/>
      <rect x="80"  y="147" width="40" height="6" rx="3" fill="var(--asbestos)" opacity="0.5"/>
      <rect x="140" y="147" width="40" height="6" rx="3" fill="var(--asbestos)" opacity="0.5"/>
      <rect x="200" y="147" width="40" height="6" rx="3" fill="var(--asbestos)" opacity="0.5"/>
      <rect x="260" y="147" width="40" height="6" rx="3" fill="var(--asbestos)" opacity="0.5"/>

      <!-- Car body -->
      <rect x="108" y="95" width="104" height="30" rx="6" fill="var(--midnight-blue)"/>
      <!-- Car roof -->
      <path d="M128 95 Q138 76 152 74 L168 74 Q182 74 192 95 Z" fill="var(--wet-asphalt)"/>
      <!-- Windows -->
      <path d="M133 95 Q140 80 152 78 L160 78 L160 95 Z" fill="var(--peter-river)" opacity="0.7"/>
      <path d="M160 78 L168 78 Q180 80 187 95 L160 95 Z" fill="var(--peter-river)" opacity="0.7"/>
      <!-- Wheels -->
      <circle cx="134" cy="125" r="10" fill="var(--midnight-blue)"/>
      <circle cx="134" cy="125" r="5"  fill="var(--silver)"/>
      <circle cx="186" cy="125" r="10" fill="var(--midnight-blue)"/>
      <circle cx="186" cy="125" r="5"  fill="var(--silver)"/>
      <!-- Headlights -->
      <rect x="208" y="103" width="8" height="5" rx="2" fill="var(--sun-flower)"/>
      <!-- Tail lights -->
      <rect x="104" y="103" width="6" height="5" rx="2" fill="var(--alizarin)"/>

      <!-- Dead-end sign post -->
      <rect x="256" y="68" width="4" height="54" rx="2" fill="var(--concrete)"/>
      <!-- Sign board -->
      <rect x="238" y="52" width="40" height="20" rx="4" fill="var(--alizarin)"/>
      <text x="258" y="66" text-anchor="middle"
            font-family="Roboto, sans-serif" font-size="9" font-weight="700" fill="white">
        DEAD END
      </text>
    </svg>
  </div>

  <!-- 404 text -->
  <p class="nf__code">404</p>
  <h1 class="nf__title">Wrong turn.</h1>
  <p class="nf__sub">This page doesn't exist — looks like you hit a dead end.<br>Let's get you back on the road.</p>

  <div class="nf__actions">
    <a routerLink="/" class="nf__btn nf__btn--primary">Back to home</a>
    <a routerLink="/vehicles" class="nf__btn nf__btn--ghost">Browse vehicles</a>
  </div>

</div>
