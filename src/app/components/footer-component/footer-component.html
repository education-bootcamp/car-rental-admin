<footer class="footer">
  <div class="footer__inner">

    <!-- Brand Column -->
    <div class="footer__brand">
      <div class="footer__logo">
        <span class="footer__logo-icon">
          <!-- Car SVG icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h14l4 4v4a2 2 0 0 1-2 2h-2"/>
            <circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/>
          </svg>
        </span>
        <span class="footer__logo-text">{{ brandName }}</span>
      </div>
      <p class="footer__tagline">{{ tagline }}</p>

      <ul class="footer__contact">
        <li *ngFor="let item of contactDetails" class="footer__contact-item">
          <span class="footer__contact-icon">
            <!-- Phone -->
            <ng-container *ngIf="item.icon === 'phone'">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07
                         A19.5 19.5 0 0 1 4.36 12a19.79 19.79 0 0 1-3.07-8.67
                         A2 2 0 0 1 3.18 1h3a2 2 0 0 1 2 1.72
                         c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 8.91
                         a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45
                         c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16.92z"/>
              </svg>
            </ng-container>
            <!-- Mail -->
            <ng-container *ngIf="item.icon === 'mail'">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </ng-container>
            <!-- Map Pin -->
            <ng-container *ngIf="item.icon === 'map-pin'">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
            </ng-container>
          </span>
          <span>{{ item.text }}</span>
        </li>
      </ul>
    </div>

    <!-- Nav Sections -->
    <div *ngFor="let section of sections" class="footer__section">
      <h4 class="footer__section-heading">{{ section.heading }}</h4>
      <ul class="footer__links">
        <li *ngFor="let link of section.links">
          <a [routerLink]="link.route" class="footer__link">{{ link.label }}</a>
        </li>
      </ul>
    </div>

  </div>

  <!-- Bottom Bar -->
  <div class="footer__bottom">
    <span class="footer__copy">
      &copy; {{ currentYear }} {{ brandName }}. All rights reserved.
    </span>
    <span class="footer__divider" aria-hidden="true">·</span>
    <a routerLink="/terms" class="footer__bottom-link">Terms</a>
    <span class="footer__divider" aria-hidden="true">·</span>
    <a routerLink="/privacy" class="footer__bottom-link">Privacy</a>
  </div>
</footer>
